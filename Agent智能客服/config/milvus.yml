# Milvus 云端配置（Zilliz Cloud 或自建集群）
milvus:
  # 云端连接配置
  uri: "https://in03-4410f8ebfee4d12.serverless.aws-eu-central-1.cloud.zilliz.com"  # 替换为你的 Public Endpoint
  token: "3e18eeb7459c1b462b66ef4fb40cfa16e0ed693baaaee405bdb7dd8a4f1dcfb38dee30c7c6f2dea531bf4a130be2c3f99655c5f4"                                      # 替换为你的 API Key
  
  # 集合配置（使用全新名称避免 Schema 冲突）
  collection_name: "kb_2026_fresh"

  # 向量维度（必须与 embedding 模型输出维度一致）
  dimension: 1024
  
  # 索引配置
  index_type: "AUTOINDEX"         # 云端推荐使用 AUTOINDEX
  metric_type: "COSINE"           # 相似度度量
  
  # 搜索配置
  search_params:
    level: 1                      # 搜索精度等级
  
  # 分块配置
  chunk_size: 500
  chunk_overlap: 50
  separators: ["\n\n", "\n", "。", "！", "？", "；", "，", " ", ""]
  
  # 检索配置
  k: 4
  
  # 数据路径（云端不需要本地路径，但保留配置结构）
  data_path: "data"
  md5_hex_store: "md5.text"
  allow_knowledge_file_type:
    - "txt"
    - "pdf"
